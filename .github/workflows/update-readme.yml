name: 📊 Auto-Update README

on:
  push:
    branches: [ main ]
    paths:
      - '**.cpp'        # Only triggers when a .cpp file is pushed

permissions:
  contents: write       # Needed to commit the updated README back

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔄 Run README updater
        run: python scripts/update_readme.py

      - name: 💾 Commit updated README
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          # Only commit if README actually changed
          git diff --staged --quiet || git commit -m "📊 Auto-update README [skip ci]"
          git push
